services:
  - type: web
    name: final-project-api
    plan: free
    env: node
    buildCommand: npm install && npx prisma generate && npx prisma db push --force-reset && node prisma/seed.js
    startCommand: node src/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: final-project-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: final-project-db
    plan: free
